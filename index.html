<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>PH Nano Banana AI Studio - Pro Glass</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
    /* ================= 苹果风毛玻璃核心 CSS ================= */
    :root {
        --glass-bg: rgba(255, 255, 255, 0.6);
        --glass-border: rgba(255, 255, 255, 0.8);
        --dark-glass-bg: rgba(15, 23, 42, 0.75);
    }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* 亮色毛玻璃卡片 */
    .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255,255,255,0.5);
    }

    /* 暗色毛玻璃卡片（用于日志） */
    .glass-dark {
        background: var(--dark-glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.4);
    }

    /* ================= 【核心优化】拟态输入框视觉升级 ================= */
    .inputMain {
        background: rgba(255, 255, 255, 0.85); /* 提高不透明度，脱离背景 */
        border: 1px solid rgba(203, 213, 225, 0.8); /* 增加清晰的边框界线 */
        padding: 12px 16px;
        border-radius: 12px;
        width: 100%;
        outline: none;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        color: #334155;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.02); /* 强化立体感 */
    }
    .inputMain:hover {
        background: rgba(255, 255, 255, 1);
        border-color: #cbd5e1;
    }
    .inputMain:focus {
        background: #ffffff;
        border-color: #818cf8;
        box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.2), inset 0 1px 2px rgba(0,0,0,0.01);
    }

    /* 【核心优化】让下拉框自带明确的箭头指示 */
    select.inputMain {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        background-position: right 0.75rem center;
        background-repeat: no-repeat;
        background-size: 1.25em 1.25em;
        padding-right: 2.5rem;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        cursor: pointer;
    }

    /* 渐变拟态按钮 */
    .btnMain {
        background: linear-gradient(135deg, #6366f1, #a855f7);
        color: white;
        padding: 10px 20px;
        border-radius: 12px;
        font-weight: 600;
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 15px -3px rgba(99, 102, 241, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .btnMain:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px -4px rgba(99, 102, 241, 0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .btnMain:active:not(:disabled) {
        transform: translateY(1px);
        box-shadow: 0 2px 10px -2px rgba(99, 102, 241, 0.4);
    }
    .btnMain:disabled {
        background: rgba(148, 163, 184, 0.5);
        color: rgba(255, 255, 255, 0.8);
        cursor: not-allowed;
        box-shadow: none;
    }

    /* 背景漂浮动画 */
    @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
    }
    .animate-blob { animation: blob 10s infinite alternate; }
    .animation-delay-2000 { animation-delay: 2s; }
    .animation-delay-4000 { animation-delay: 4s; }

    /* 其他辅助样式 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(203, 213, 225, 0.8); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.8); }
    
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    .sortable-ghost { opacity: 0.3; background: rgba(0,0,0,0.1); border-radius: 8px; }
    .log-success{color: #34d399;}
    .log-error{color: #f87171;}
    .log-warning{color: #fbbf24;}
    .log-info{color: #94a3b8;}
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
</style>
</head>

<body class="bg-slate-50 min-h-screen p-6 relative overflow-x-hidden text-slate-800">

<div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-purple-300 rounded-full mix-blend-multiply filter blur-[100px] opacity-60 animate-blob pointer-events-none z-0"></div>
<div class="fixed top-[20%] right-[-5%] w-96 h-96 bg-blue-300 rounded-full mix-blend-multiply filter blur-[100px] opacity-60 animate-blob animation-delay-2000 pointer-events-none z-0"></div>
<div class="fixed bottom-[-10%] left-[20%] w-[500px] h-[500px] bg-pink-300 rounded-full mix-blend-multiply filter blur-[120px] opacity-60 animate-blob animation-delay-4000 pointer-events-none z-0"></div>

<div class="relative z-10">

<div id="announcementBar" class="max-w-7xl mx-auto mb-2 glass-card bg-blue-50/50 p-4 rounded-2xl hidden flex justify-between items-center transition-all duration-300">
    <div class="flex items-center">
        <svg class="h-5 w-5 text-indigo-500 mr-3" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path>
        </svg>
        <span id="announcementText" class="text-sm text-indigo-900 font-medium">加载公告中...</span>
    </div>
    <button onclick="closeAnnouncement()" class="text-indigo-400 hover:text-indigo-600 font-bold ml-4">✕</button>
</div>

<div id="rechargeBar" class="max-w-7xl mx-auto mb-3 glass-card bg-green-50/50 p-4 rounded-2xl flex justify-between items-center transition-all duration-300">
    <div class="flex items-center">
        <svg class="h-5 w-5 text-emerald-500 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span class="text-sm text-emerald-900 font-medium">积分换算：100积分=3元，充值请联系作者！（WX：lp01291070），另有ComfyUI用户也可提供对应的插件，Key通用</span>
    </div>
    <button onclick="document.getElementById('rechargeBar').classList.add('hidden')" class="text-emerald-400 hover:text-emerald-600 font-bold ml-4">✕</button>
</div>

<div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">

<div class="lg:col-span-2 space-y-6">

<div class="glass-card p-7 rounded-3xl flex flex-col gap-3">
    <h2 class="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 border-b border-indigo-100 pb-4">PH Nano Banana AI Studio</h2>

    <div>
        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 tracking-wider uppercase">🔑 API Key 设置</label>
        <div class="flex gap-3 items-stretch">
            <div class="relative flex-1">
                <input type="password" id="apikey" class="inputMain pr-10" placeholder="填写您的 API Key">
                <button onclick="clearApiKey()" class="absolute top-1/2 right-2 transform -translate-y-1/2 text-slate-400 hover:text-rose-500 bg-slate-100 hover:bg-rose-50 rounded-full w-7 h-7 flex items-center justify-center transition-all border border-slate-200 shadow-sm" title="彻底清除本地保存的 API Key">✕</button>
            </div>
            <button onclick="checkCredits()" class="btnMain whitespace-nowrap flex-shrink-0 px-6 bg-slate-800 shadow-md">查询余额</button>
        </div>
    </div>

    <div class="bg-white/40 p-3 rounded-2xl border border-white/60 shadow-[inset_0_2px_10px_rgba(255,255,255,0.4)]">
        <label class="block text-xs font-bold text-indigo-500 mb-1 ml-1 tracking-wider uppercase">⚙️ 生成参数</label>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="flex flex-col gap-1.5">
                <span class="text-[11px] font-semibold text-slate-500 pl-1">模型 (Model)</span>
                <select id="model" class="inputMain font-medium text-sm">
                    <option value="nano-banana-2">banana-2--6.5积分</option>
                    <option value="nano-banana-fast">banana-1--2.2积分</option>
                    <option value="nano-banana-pro">banana-1-pro--9积分</option>
                    <option value="nano-banana-pro-vt">banana-1-v--9积分</option>
                    <option value="nano-banana-pro-cl">banana-1-c--17积分（质量最高）</option>
                </select>
            </div>
            <div class="flex flex-col gap-1.5">
                <span class="text-[11px] font-semibold text-slate-500 pl-1">比例 (Ratio)</span>
                <select id="ratio" class="inputMain font-medium text-sm">
                    <option value="auto">auto</option>
                    <option value="1:1">1:1</option>
                    <option value="16:9">16:9</option>
                    <option value="9:16">9:16</option>
                    <option value="4:3">4:3</option>
                    <option value="3:4">3:4</option>
                    <option value="21:9">21:9</option>
                    <option value="4:1">4:1 - banana-2专属</option>
                    <option value="1:4">1:4 - banana-2专属</option>
                    <option value="8:1">8:1 - banana-2专属</option>
                    <option value="1:8">1:8 - banana-2专属</option>
                </select>
            </div>
            <div class="flex flex-col gap-1.5">
                <span class="text-[11px] font-semibold text-slate-500 pl-1">尺寸 (Size)</span>
                <select id="imageSize" class="inputMain font-medium text-sm">
                    <option value="1K">1K</option>
                    <option value="2K">2K</option>
                    <option value="4K">4K</option>
                    <option value="0.5K">0.5K - banana-2专属</option>
                </select>
            </div>
            <div class="flex flex-col gap-1.5">
                <span class="text-[11px] font-semibold text-slate-500 pl-1">数量 (Count)</span>
                <select id="countSelect" class="inputMain font-medium text-sm">
                    <option value="1">1 张</option>
                    <option value="2">2 张</option>
                    <option value="3">3 张</option>
                    <option value="4">4 张</option>
                    <option value="custom">自定义</option>
                </select>
            </div>
        </div>
        <input id="customCount" type="number" min="1" max="20" class="inputMain mt-4 hidden" placeholder="输入自定义生成数量 (1-20)">
    </div>

    <div>
        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 tracking-wider uppercase">📝 提示词 (Prompt)</label>
        <div class="relative">
            <textarea id="prompt" class="inputMain pr-10 leading-relaxed resize-y shadow-sm" rows="4" placeholder="在此输入您的创作提示词，描述画面的细节要素..."></textarea>
            <button onclick="if(confirm('确定要清空提示词吗？')) document.getElementById('prompt').value=''" class="absolute top-3 right-3 text-slate-400 hover:text-rose-500 bg-slate-100 hover:bg-rose-50 rounded-full w-7 h-7 flex items-center justify-center transition-all shadow-sm border border-slate-200" title="清空提示词">✕</button>
        </div>
    </div>

    <div class="bg-indigo-50/40 p-3 rounded-2xl border border-indigo-100/60 shadow-[inset_0_2px_10px_rgba(255,255,255,0.6)]">
        <div class="flex flex-wrap justify-between items-center mb-3 gap-2">
            <label class="text-xs font-bold text-indigo-600 ml-1 tracking-wider uppercase flex items-center gap-2">
                🖼️ 参考素材设置
                <span id="refImageCount" class="bg-indigo-500 text-white px-2 py-0.5 rounded-full text-[10px] shadow-sm">0/16</span>
            </label>
            <span class="text-[11px] text-slate-500 font-medium">支持拖拽排序 | 悬停点击 ✏️ 可涂鸦蒙版</span>
        </div>
        
        <input type="file" id="refImages" multiple accept="image/*" class="inputMain mb-3 text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-100 file:text-indigo-700 hover:file:bg-indigo-200 cursor-pointer bg-white/70">
        <textarea id="refUrls" class="inputMain mb-4 text-sm bg-white/70" rows="2" placeholder="或者直接粘贴图片 URL (支持多行批量粘贴)..."></textarea>
        
        <div id="previewArea" class="flex flex-wrap gap-4 min-h-[60px] p-3 bg-white/50 rounded-xl border border-dashed border-slate-300/80 items-center justify-start shadow-inner empty:after:content-['尚未添加任何参考图片'] empty:after:text-slate-400 empty:after:text-sm empty:after:w-full empty:after:text-center"></div>
    </div>

    <div class="flex gap-4 pt-2">
        <button id="generateBtn" onclick="generate()" class="btnMain flex-1 text-lg tracking-wide shadow-lg hover:shadow-indigo-500/30">✨ 开始生成</button>
        <button id="cancelBtn" onclick="cancelTask()" class="btnMain hidden text-lg shadow-md hover:scale-[102%]" style="background: linear-gradient(135deg, #ef4444, #f43f5e); width: auto; padding-left: 2.5rem; padding-right: 2.5rem;">停止任务</button>
    </div>
</div>

<div class="glass-card p-6 rounded-3xl">
    <div class="flex justify-between items-center mb-4 gap-4">
        
        <div class="flex items-center gap-3 overflow-x-auto pb-1 scrollbar-hide w-full">
            <h3 class="font-bold text-slate-700 text-lg whitespace-nowrap shrink-0">当前生成结果</h3>
            
            <div class="flex items-center gap-2 text-sm text-slate-600 font-medium bg-white/50 backdrop-blur px-3 py-1.5 rounded-full border border-slate-200 shadow-sm whitespace-nowrap shrink-0">
                <label class="relative inline-flex items-center cursor-pointer mb-0">
                  <input type="checkbox" id="autoSaveToggle" class="sr-only peer" onchange="handleAutoSaveToggle()">
                  <div class="w-8 h-4 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-emerald-500"></div>
                  <span class="ml-2 text-[11px] font-bold text-slate-600">自动保存</span>
                </label>
                <div class="w-px h-3 bg-slate-300 mx-1"></div>
                <span id="autoSavePathLabel" onclick="changeAutoSavePath()" class="text-[11px] text-indigo-600 cursor-pointer hover:text-indigo-800 hover:underline transition-colors" title="点击修改保存目录">未选择</span>
            </div>
            
            <div class="flex items-center bg-white/50 backdrop-blur rounded-full border border-slate-200 overflow-hidden shadow-sm shrink-0 w-[200px]">
                <input type="text" id="recoverTaskId" placeholder="输入ID找回任务..." class="bg-transparent border-none text-[11px] px-3 py-1.5 w-full outline-none text-slate-600 placeholder-slate-400">
                <button onclick="recoverTask()" class="bg-indigo-500 hover:bg-indigo-600 text-white text-[11px] px-3 py-1.5 font-bold transition-colors whitespace-nowrap border-l border-indigo-600">找回</button>
            </div>
        </div>

        <button id="downloadAllBtn" onclick="downloadAllResults()" class="text-sm bg-indigo-50/80 border border-indigo-200 text-indigo-600 px-4 py-1.5 rounded-full hover:bg-indigo-100 hover:shadow shadow-sm hidden transition-all font-medium whitespace-nowrap shrink-0">一键下载</button>
    </div>
    
    <div id="resultArea" class="columns-2 gap-4 min-h-[150px]"></div>
</div>

</div>

<div class="flex flex-col gap-6">

<div class="bg-black text-white p-5 rounded-xl shadow h-[450px] flex flex-col relative overflow-hidden">
    <div class="absolute top-[-50px] right-[-50px] w-32 h-32 bg-indigo-500 rounded-full mix-blend-screen filter blur-[60px] opacity-30 pointer-events-none"></div>
    <div class="flex justify-between items-center mb-3 relative z-10">
        <h3 class="font-bold tracking-wide">运行日志</h3>
        <button onclick="clearLog()" class="text-xs text-slate-400 hover:text-white bg-slate-800/50 px-3 py-1 rounded-full border border-slate-700 transition-all">清空</button>
    </div>
    <div class="flex gap-3 text-xs mb-4 relative z-10">
        <div class="flex-1"><label class="block mb-1 text-slate-400">轮询(秒)</label><input id="pollInterval" type="number" value="5" min="1" class="w-full px-3 py-1.5 rounded-lg bg-slate-800/80 border border-slate-700 text-white outline-none focus:border-indigo-500"></div>
        <div class="flex-1"><label class="block mb-1 text-slate-400">超时(秒)</label><input id="pollTimeout" type="number" value="201" min="5" class="w-full px-3 py-1.5 rounded-lg bg-slate-800/80 border border-slate-700 text-white outline-none focus:border-indigo-500"></div>
    </div>
    <div id="logArea" class="flex-1 overflow-y-auto text-xs font-mono pr-2 flex flex-col gap-2 relative z-10"></div>
</div>

<div class="glass-card p-6 rounded-3xl h-[640px] flex flex-col">
    <div class="flex flex-col gap-3 mb-4">
        <div class="flex justify-between items-center">
            <h3 class="font-semibold leading-tight">
                <span class="text-base block">历史记录（图片时效2h）</span>
                <span class="text-[14px] text-gray-400 font-normal tracking-tighter">请及时下载(过期复用仍可用)</span>
            </h3>
            <div class="flex gap-2 items-center flex-shrink-0">
                <button onclick="exportHistory()" class="text-xs text-blue-500 hover:text-blue-700">导出</button>
                <button onclick="document.getElementById('importFile').click()" class="text-xs text-green-500 hover:text-green-700">导入</button>
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importHistory(event)">
                <span class="text-gray-300">|</span>
                <button onclick="clearHistory()" class="text-xs text-red-500 hover:text-red-700">清空</button>
            </div>
        </div>
        <div class="relative w-full">
            <input type="text" id="historySearch" oninput="renderHistory()" placeholder="🔍 输入提示词关键信息搜索历史..." class="inputMain text-xs py-1.5 px-3 w-full bg-gray-50 border-gray-200 focus:bg-white pr-8">
            <button onclick="document.getElementById('historySearch').value=''; renderHistory();" class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-700 text-sm font-bold">✕</button>
        </div>
    </div>
    <div id="historyArea" class="columns-2 lg:columns-3 gap-3 overflow-y-auto flex-1 content-start pr-1 pb-4"></div>
</div>

</div>
</div>

<div id="imageModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity">
    <button onclick="closeModal()" class="absolute top-5 right-8 text-white/80 hover:text-white text-4xl z-50 drop-shadow-md">✕</button>
    <button id="prevArrow" onclick="prevModalImage()" class="absolute left-6 top-1/2 transform -translate-y-1/2 text-white/60 hover:text-white bg-black/30 hover:bg-black/50 rounded-full w-14 h-14 flex items-center justify-center text-3xl z-50 transition-all hidden">&#10094;</button>
    
    <img id="modalImg" alt="图片加载中或已过期" class="max-w-[90%] max-h-[85%] rounded-xl shadow-2xl object-contain text-white text-center">
    
    <button id="nextArrow" onclick="nextModalImage()" class="absolute right-6 top-1/2 transform -translate-y-1/2 text-white/60 hover:text-white bg-black/30 hover:bg-black/50 rounded-full w-14 h-14 flex items-center justify-center text-3xl z-50 transition-all hidden">&#10095;</button>
    
    <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 flex gap-3 z-50 bg-black/40 p-2.5 rounded-2xl backdrop-blur-md border border-white/10 shadow-2xl w-max">
        <button id="reuseBtn" onclick="reuseModalParams()" class="bg-emerald-500/90 hover:bg-emerald-500 text-white px-4 md:px-5 py-2.5 rounded-xl shadow font-medium transition-all hidden border border-emerald-400/50 hover:scale-105 text-sm">✨ 复用参数</button>
        <button onclick="uploadToRefFromModal()" class="bg-amber-500/90 hover:bg-amber-500 text-white px-4 md:px-5 py-2.5 rounded-xl shadow font-medium transition-all border border-amber-400/50 hover:scale-105 text-sm">🖼️ 设为参考图</button>
        <button onclick="downloadModalImage()" class="bg-indigo-500/90 hover:bg-indigo-500 text-white px-4 md:px-5 py-2.5 rounded-xl shadow font-medium transition-all border border-indigo-400/50 hover:scale-105 text-sm">⬇️ 下载原图</button>
    </div>
</div>

<div id="editorModalWrapper" class="hidden fixed inset-0 bg-slate-900/85 backdrop-blur-xl flex flex-col items-center justify-center z-[60] transition-opacity">
    <div class="bg-white/10 backdrop-blur-md border border-white/20 p-5 rounded-3xl w-[95%] max-w-4xl flex flex-col gap-5 shadow-[0_0_50px_rgba(0,0,0,0.5)]">
        
        <div class="flex justify-between items-center text-white">
            <h3 class="font-bold text-xl flex items-center gap-2">🖌️ 参考素材涂鸦编辑器</h3>
            <button onclick="closeEditor()" class="hover:text-rose-400 text-2xl font-bold transition-colors">✕</button>
        </div>
        
        <div class="flex flex-wrap gap-3 items-center bg-black/40 p-3.5 rounded-2xl border border-white/10 text-sm text-white">
            <button id="btnBrush" onclick="setEditorTool('brush')" class="bg-indigo-500 hover:bg-indigo-600 px-4 py-2 rounded-xl ring-2 ring-indigo-300 font-medium transition-all shadow">🖌️ 画笔</button>
            <button id="btnEraser" onclick="setEditorTool('eraser')" class="bg-slate-600 hover:bg-slate-700 px-4 py-2 rounded-xl font-medium transition-all shadow">🧽 橡皮擦</button>
            <div class="w-px h-6 bg-white/20 mx-1"></div>
            
            <label class="flex items-center gap-2 font-medium cursor-pointer">
                颜色: <input type="color" id="brushColor" value="#ffffff" class="w-8 h-8 rounded cursor-pointer bg-transparent border-0">
            </label>
            <label class="flex items-center gap-2 font-medium cursor-pointer mr-2">
                粗细: <input type="range" id="brushSize" min="1" max="100" value="20" class="w-20 cursor-pointer accent-indigo-500">
            </label>
            
            <div class="w-px h-6 bg-white/20 mx-1 hidden sm:block"></div>
            
            <button id="btnUndo" onclick="undoEditor()" disabled class="bg-slate-600 hover:bg-slate-700 disabled:opacity-40 disabled:cursor-not-allowed px-3 py-2 rounded-xl font-medium transition-all shadow" title="返回上一步">↩️ 撤销</button>
            <button id="btnRedo" onclick="redoEditor()" disabled class="bg-slate-600 hover:bg-slate-700 disabled:opacity-40 disabled:cursor-not-allowed px-3 py-2 rounded-xl font-medium transition-all shadow" title="返回下一步">↪️ 重做</button>

            <button onclick="clearEditorCanvas()" class="bg-rose-500/80 hover:bg-rose-600 px-4 py-2 rounded-xl font-medium transition-all sm:ml-auto shadow">🗑️ 擦除重置</button>
        </div>
        
        <div class="relative w-full rounded-2xl bg-black/60 border border-white/10 flex justify-center items-center p-3 overflow-hidden shadow-inner" style="height: 60vh;">
            <div class="relative max-w-full max-h-full inline-block" id="canvasContainer">
                <canvas id="bgCanvas" class="block max-w-full max-h-[55vh] w-auto h-auto rounded pointer-events-none shadow-md object-contain"></canvas>
                <canvas id="editorCanvas" class="absolute top-0 left-0 max-w-full max-h-[55vh] w-full h-full cursor-crosshair touch-none rounded"></canvas>
            </div>
        </div>
        
        <div class="flex justify-end gap-4 mt-1">
            <button onclick="closeEditor()" class="px-6 py-2.5 rounded-xl bg-slate-600/80 hover:bg-slate-600 border border-white/10 text-white font-medium transition-all">取消修改</button>
            <button onclick="saveEditor()" class="px-6 py-2.5 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 shadow-lg text-white font-bold transition-all hover:scale-105">✅ 保存涂鸦</button>
        </div>
    </div>
</div>

<script>
const HOST = atob("aHR0cHM6Ly9ncnNhaS5kYWtrYS5jb20uY24=");
const MAX_IMAGES=16, MAX_IMG_WIDTH=2048, MAX_HISTORY=500;
let uploadedImagesBase64=[], uploadedImageUrls=[], historyImages = JSON.parse(localStorage.getItem('banana_history')) || [];
let currentResultUrls = [], isTaskCancelled = false, currentModalItem = null, currentModalIndex = -1;

/* ===== 文件系统自动保存 API 逻辑 ===== */
let autoSaveDirHandle = null;

window.handleAutoSaveToggle = async function() {
    const toggle = document.getElementById('autoSaveToggle');
    const label = document.getElementById('autoSavePathLabel');
    
    if (toggle.checked) {
        if (!window.showDirectoryPicker) {
            alert("⚠️ 您的浏览器不支持指定目录自动保存功能，请使用最新版 Chrome 或 Edge 浏览器。");
            toggle.checked = false;
            return;
        }
        try {
            autoSaveDirHandle = await window.showDirectoryPicker({ mode: "readwrite" });
            label.innerText = autoSaveDirHandle.name;
            label.title = "已开启自动保存，点击修改目录: " + autoSaveDirHandle.name;
            log(`已开启自动保存，所有生成图片将存入 [${autoSaveDirHandle.name}]`, "success");
        } catch (e) {
            console.warn("User cancelled directory selection", e);
            toggle.checked = false;
            label.innerText = "未选择";
        }
    } else {
        autoSaveDirHandle = null;
        label.innerText = "未选择";
        label.title = "点击修改保存目录";
        log("自动保存功能已关闭", "info");
    }
}

window.changeAutoSavePath = async function() {
    const toggle = document.getElementById('autoSaveToggle');
    if (!window.showDirectoryPicker) {
        alert("⚠️ 您的浏览器不支持指定目录自动保存功能，请使用最新版 Chrome 或 Edge 浏览器。");
        return;
    }
    try {
        autoSaveDirHandle = await window.showDirectoryPicker({ mode: "readwrite" });
        const label = document.getElementById('autoSavePathLabel');
        label.innerText = autoSaveDirHandle.name;
        label.title = "已开启自动保存，点击修改目录: " + autoSaveDirHandle.name;
        toggle.checked = true;
        log(`已修改自动保存目录至 [${autoSaveDirHandle.name}]`, "success");
    } catch (e) {
        console.warn("User cancelled directory selection", e);
    }
}

window.autoSaveToDisk = async function(url, filename) {
    if (!autoSaveDirHandle) return;
    try {
        const res = await fetch(url);
        const blob = await res.blob();
        const fileHandle = await autoSaveDirHandle.getFileHandle(filename, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
        log(`💾 已静默保存至本地: ${filename}`, "success");
    } catch(e) {
        log(`❌ 自动保存到本地失败: ${e.message}`, "error");
    }
}

/* ===== 参考图编辑器逻辑 ===== */
let bgCanvas, editorCanvas, bgCtx, editorCtx;
let editIndex = -1;
let isDrawing = false;
let currentTool = 'brush';
let undoStack = [];
let redoStack = [];

function saveEditorState() {
    if (!editorCanvas) return;
    undoStack.push(editorCanvas.toDataURL("image/png"));
    if (undoStack.length > 30) undoStack.shift(); 
    redoStack = []; 
    updateUndoRedoButtons();
}

function updateUndoRedoButtons() {
    const btnUndo = document.getElementById("btnUndo");
    const btnRedo = document.getElementById("btnRedo");
    if(btnUndo) btnUndo.disabled = undoStack.length <= 1; 
    if(btnRedo) btnRedo.disabled = redoStack.length === 0;
}

function undoEditor() {
    if (undoStack.length > 1) {
        redoStack.push(undoStack.pop()); 
        restoreEditorState(undoStack[undoStack.length - 1]);
    }
}

function redoEditor() {
    if (redoStack.length > 0) {
        const state = redoStack.pop();
        undoStack.push(state);
        restoreEditorState(state);
    }
}

function restoreEditorState(dataUrl) {
    const img = new Image();
    img.onload = () => {
        const prevGCO = editorCtx.globalCompositeOperation;
        editorCtx.globalCompositeOperation = "source-over"; 
        editorCtx.clearRect(0, 0, editorCanvas.width, editorCanvas.height);
        editorCtx.drawImage(img, 0, 0);
        editorCtx.globalCompositeOperation = prevGCO; 
        updateUndoRedoButtons();
    };
    img.src = dataUrl;
}

function initEditor() {
    bgCanvas = document.getElementById("bgCanvas");
    editorCanvas = document.getElementById("editorCanvas");
    bgCtx = bgCanvas.getContext("2d");
    editorCtx = editorCanvas.getContext("2d", { willReadFrequently: true }); 

    const startDraw = (e) => {
        isDrawing = true;
        editorCtx.beginPath();
        draw(e);
    };

    const draw = (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        
        const rect = editorCanvas.getBoundingClientRect();
        const scaleX = editorCanvas.width / rect.width;
        const scaleY = editorCanvas.height / rect.height;
        
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        
        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;

        editorCtx.lineWidth = document.getElementById("brushSize").value;
        editorCtx.lineCap = "round";
        editorCtx.lineJoin = "round";

        if (currentTool === 'eraser') {
            editorCtx.globalCompositeOperation = "destination-out";
            editorCtx.strokeStyle = "rgba(0,0,0,1)"; 
        } else {
            editorCtx.globalCompositeOperation = "source-over";
            editorCtx.strokeStyle = document.getElementById("brushColor").value;
        }

        editorCtx.lineTo(x, y);
        editorCtx.stroke();
        editorCtx.beginPath();
        editorCtx.moveTo(x, y);
    };

    const stopDraw = () => {
        if (isDrawing) {
            isDrawing = false;
            editorCtx.beginPath();
            saveEditorState();
        }
    };

    editorCanvas.addEventListener("mousedown", startDraw);
    editorCanvas.addEventListener("mousemove", draw);
    editorCanvas.addEventListener("mouseup", stopDraw);
    editorCanvas.addEventListener("mouseout", stopDraw);
    
    editorCanvas.addEventListener("touchstart", startDraw, {passive: false});
    editorCanvas.addEventListener("touchmove", draw, {passive: false});
    editorCanvas.addEventListener("touchend", stopDraw);
    editorCanvas.addEventListener("touchcancel", stopDraw);
}

function setEditorTool(tool) {
    currentTool = tool;
    document.getElementById("btnBrush").classList.toggle("ring-2", tool === 'brush');
    document.getElementById("btnBrush").classList.toggle("ring-indigo-300", tool === 'brush');
    document.getElementById("btnEraser").classList.toggle("ring-2", tool === 'eraser');
    document.getElementById("btnEraser").classList.toggle("ring-slate-300", tool === 'eraser');
}

function clearEditorCanvas(recordHistory = true) {
    editorCtx.clearRect(0, 0, editorCanvas.width, editorCanvas.height);
    if (recordHistory) {
        saveEditorState();
    }
}

function openEditor(idx) {
    editIndex = idx;
    const totalImgs = [...uploadedImagesBase64, ...uploadedImageUrls];
    const src = totalImgs[idx];
    
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
        document.getElementById("editorModalWrapper").classList.remove("hidden");
        bgCanvas.width = img.width;
        bgCanvas.height = img.height;
        editorCanvas.width = img.width;
        editorCanvas.height = img.height;
        
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        bgCtx.drawImage(img, 0, 0);
        
        clearEditorCanvas(false);
        
        undoStack = [];
        redoStack = [];
        saveEditorState();
    };
    img.onerror = () => {
        alert("⚠️ 无法加载此图片进行编辑。可能是由于该URL图片具有跨域保护限制，建议您先将其保存到本地，重新上传后再进行涂鸦。");
    };
    img.src = src;
}

function saveEditor() {
    try {
        const mergeCanvas = document.createElement("canvas");
        mergeCanvas.width = bgCanvas.width;
        mergeCanvas.height = bgCanvas.height;
        const mCtx = mergeCanvas.getContext("2d");
        
        mCtx.drawImage(bgCanvas, 0, 0);
        mCtx.drawImage(editorCanvas, 0, 0);
        
        const dataUrl = mergeCanvas.toDataURL("image/jpeg", 0.92);
        
        if (editIndex < uploadedImagesBase64.length) {
            uploadedImagesBase64[editIndex] = dataUrl;
        } else {
            uploadedImageUrls.splice(editIndex - uploadedImagesBase64.length, 1);
            uploadedImagesBase64.push(dataUrl);
            document.getElementById("refUrls").value = uploadedImageUrls.join("\n");
        }
        
        renderPreview();
        closeEditor();
        log("✅ 参考素材涂鸦保存成功", "success");
    } catch(e) {
        alert("保存失败：浏览器安全策略拦截了图片数据导出。");
    }
}

function closeEditor() {
    document.getElementById("editorModalWrapper").classList.add("hidden");
    editIndex = -1;
}

/* ===== 核心工具函数 ===== */

function log(msg, type = "info") {
    const area = document.getElementById("logArea");
    if(!area) return;
    const div = document.createElement("div");
    div.className = "log-" + type + " mb-1 tracking-wider";
    div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
}

function renderLogTaskCard(uniqueId, displayIdx) {
    const area = document.getElementById("logArea");
    if(!area) return;
    const cardHTML = `
        <div id="log-card-${uniqueId}" class="bg-slate-800/50 border border-slate-600/40 backdrop-blur-md rounded-xl p-3 flex flex-col gap-2 shadow transition-all duration-300">
            <div class="flex justify-between items-center">
                <span class="text-indigo-300 font-bold text-[12px] bg-indigo-500/20 px-2 py-0.5 rounded">任务 ${displayIdx}</span>
                <span id="log-status-${uniqueId}" class="text-amber-400 text-[11px] font-medium animate-pulse">准备提交...</span>
            </div>
            <div id="log-id-${uniqueId}" class="text-[10px] text-slate-400/80 truncate font-mono">ID: 等待分配</div>
            <div class="w-full bg-slate-900/80 rounded-full h-1.5 overflow-hidden shadow-inner border border-slate-700/50">
                <div id="log-progress-${uniqueId}" class="bg-blue-500 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>
    `;
    area.insertAdjacentHTML('beforeend', cardHTML);
    area.scrollTop = area.scrollHeight;
}

function updateLogTaskCard(uniqueId, statusMsg, progress, taskId = null, isError = false) {
    const statusEl = document.getElementById(`log-status-${uniqueId}`);
    const progressEl = document.getElementById(`log-progress-${uniqueId}`);
    const idEl = document.getElementById(`log-id-${uniqueId}`);
    const cardEl = document.getElementById(`log-card-${uniqueId}`);
    
    if(!cardEl) return;

    if(statusEl) {
        statusEl.innerText = statusMsg;
        statusEl.classList.remove('animate-pulse');
        if(isError) statusEl.className = "text-red-400 text-[10px]";
        else if(progress === 100) statusEl.className = "text-green-400 text-[10px]";
        else statusEl.className = "text-blue-300 text-[10px]";
    }
    if(progressEl && !isError) progressEl.style.width = `${progress}%`;
    if(progressEl && isError) progressEl.className = "bg-red-500 h-1.5 rounded-full";
    if(progressEl && progress === 100) progressEl.className = "bg-green-500 h-1.5 rounded-full";
    if(idEl && taskId) idEl.innerText = `ID: ${taskId}`;
}

function renderResultSkeleton(uniqueId) {
    const area = document.getElementById("resultArea");
    if(!area) return;
    const skeletonHTML = `
        <div id="skeleton-${uniqueId}" class="relative w-full mb-4 break-inside-avoid aspect-[3/4] bg-gray-100 rounded-2xl flex flex-col items-center justify-center overflow-hidden border border-dashed border-gray-300 shadow-sm">
            <div class="absolute inset-0 bg-gray-200/50 animate-pulse"></div>
            <div class="relative z-10 flex flex-col items-center w-3/4">
                <svg class="w-8 h-8 text-gray-400 mb-2 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <div class="text-xs font-semibold text-gray-500 mb-2 tracking-widest">生成中...</div>
                <div class="w-full bg-gray-300 rounded-full h-1.5 overflow-hidden">
                    <div id="skel-progress-${uniqueId}" class="bg-green-500 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <div id="skel-text-${uniqueId}" class="text-[10px] text-gray-500 mt-1 font-mono">0%</div>
            </div>
        </div>
    `;
    area.insertAdjacentHTML('beforeend', skeletonHTML);
}

function updateSkeletonProgress(uniqueId, progress, isError = false) {
    const progEl = document.getElementById(`skel-progress-${uniqueId}`);
    const textEl = document.getElementById(`skel-text-${uniqueId}`);
    if(progEl && !isError) progEl.style.width = `${progress}%`;
    if(textEl && !isError) textEl.innerText = `${progress}%`;
    
    if(isError && textEl) {
        textEl.innerText = "生成失败";
        textEl.className = "text-xs text-red-500 mt-1 font-bold";
        if(progEl) progEl.className = "bg-red-500 h-1.5 rounded-full";
        const skel = document.getElementById(`skeleton-${uniqueId}`);
        if(skel) {
            const pulse = skel.querySelector('.animate-pulse');
            if(pulse) pulse.classList.remove('animate-pulse');
        }
    }
}

async function parseSafeJson(res) {
    const text = await res.text();
    if(!text) return null;
    try {
        return JSON.parse(text);
    } catch(e) {
        if(text.startsWith("data: ")) return JSON.parse(text.substring(6).trim());
        throw new Error("无法解析的响应格式：" + text.substring(0, 50));
    }
}

window.initSortable = function() {
    const el = document.getElementById('previewArea');
    if(!el) return;
    Sortable.create(el, {
        animation: 150, ghostClass: 'sortable-ghost',
        onEnd: function(evt) {
            const all = [...uploadedImagesBase64, ...uploadedImageUrls];
            const [moved] = all.splice(evt.oldIndex, 1);
            all.splice(evt.newIndex, 0, moved);
            uploadedImagesBase64 = all.filter(s => s.startsWith('data:image'));
            uploadedImageUrls = all.filter(s => !s.startsWith('data:image'));
            renderPreview();
        }
    });
};

window.renderPreview = function() {
    const area = document.getElementById("previewArea");
    if(!area) return;
    area.innerHTML = "";
    const total = [...uploadedImagesBase64, ...uploadedImageUrls];
    document.getElementById("refImageCount").innerText = `${total.length}/${MAX_IMAGES}`;
    
    total.forEach((src, idx) => {
        const wrap = document.createElement("div"); 
        wrap.className = "relative cursor-move hover:scale-[1.03] transition-transform group";
        
        const img = document.createElement("img"); 
        img.src = src; 
        img.className = "w-20 h-20 object-cover rounded-xl shadow-sm pointer-events-none border border-slate-300";
        
        const badge = document.createElement("span"); 
        badge.innerText = idx + 1;
        badge.className = "absolute top-1 left-1 bg-black/60 backdrop-blur text-white text-[10px] font-bold px-1.5 py-0.5 rounded pointer-events-none";
        
        const btnDelete = document.createElement("button"); 
        btnDelete.innerText = "✕";
        btnDelete.className = "absolute -top-2 -right-2 bg-rose-500/90 backdrop-blur hover:bg-rose-600 text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center z-10 shadow-md transition-all opacity-0 group-hover:opacity-100 scale-90 group-hover:scale-100 border border-white/30";
        btnDelete.onclick = (e) => {
            e.stopPropagation();
            if (idx < uploadedImagesBase64.length) uploadedImagesBase64.splice(idx, 1);
            else { uploadedImageUrls.splice(idx - uploadedImagesBase64.length, 1); document.getElementById("refUrls").value = uploadedImageUrls.join("\n"); }
            renderPreview();
        };

        const btnEdit = document.createElement("button");
        btnEdit.innerText = "✏️";
        btnEdit.title = "点击涂鸦编辑";
        btnEdit.className = "absolute -bottom-1 -left-1 bg-indigo-500/90 backdrop-blur hover:bg-indigo-600 text-white text-[12px] rounded-full w-6 h-6 flex items-center justify-center z-10 shadow-md transition-all opacity-0 group-hover:opacity-100 scale-90 group-hover:scale-100 border border-white/30";
        btnEdit.onclick = (e) => {
            e.stopPropagation();
            openEditor(idx);
        };

        wrap.append(img, badge, btnDelete, btnEdit); 
        area.appendChild(wrap);
    });
};

window.checkCredits = async function() {
    const key = document.getElementById("apikey").value.trim();
    if(!key) return log("API Key 为空","error");
    localStorage.setItem('banana_apikey', key); 
    try {
        log("查询余额中...");
        const res = await fetch(`${HOST}/client/openapi/getAPIKeyCredits`, {
            method: "POST", headers: {"Content-Type":"application/json"},
            body: JSON.stringify({apiKey: key})
        });
        const d = await parseSafeJson(res);
        if(d && d.code === 0) log("余额：" + (d.data.credits / 200).toFixed(2), "success");
        else log("查询失败：" + (d ? d.msg : "未知原因"), "error");
    } catch(err) { log("查询异常：" + err.message, "error"); }
};

window.recoverTask = async function() {
    const taskId = document.getElementById("recoverTaskId").value.trim();
    if (!taskId) return alert("请输入要找回的任务 ID！");
    
    const key = document.getElementById("apikey").value.trim();
    if(!key) return alert("请先填写 API Key");

    const btn = document.querySelector("#recoverTaskId").nextElementSibling;
    const originalText = btn.innerText;
    btn.innerText = "查找中...";
    btn.disabled = true;

    try {
        const res = await fetch(`${HOST}/v1/draw/result`, {
            method: "POST", headers: {"Content-Type":"application/json", "Authorization": "Bearer " + key},
            body: JSON.stringify({id: taskId})
        });
        const d = await parseSafeJson(res);
        
        if (!d || !d.data) {
            alert("未找到该任务或查询失败");
        } else if (d.data.status === "succeeded") {
            log(`[找回成功] 任务ID: ${taskId}`, "success");
            
            let savedP = null;
            let costSeconds = null;
            try {
                let meta = JSON.parse(localStorage.getItem('banana_tasks_meta') || '{}');
                savedP = meta[taskId]; 
                if (savedP && savedP.costTime) {
                    costSeconds = savedP.costTime;
                }
            } catch(e) {}

            if (!costSeconds) {
                if (d.data.cost) costSeconds = Math.round(d.data.cost);
                else if (d.data.duration) costSeconds = Math.round(d.data.duration);
                else if (d.data.costTime) costSeconds = Math.round(d.data.costTime);
            }

            const badgeText = costSeconds ? `耗时 ${costSeconds} 秒` : "已找回";

            const p = savedP || {
                model: d.data.model || d.data.request?.model || "nano-banana-2",
                prompt: d.data.prompt || d.data.request?.prompt || "本地缓存未找到该任务的原始提示词（图片已找回）",
                ratio: d.data.aspectRatio || d.data.request?.aspectRatio || "auto",
                size: d.data.imageSize || d.data.request?.imageSize || "1K"
            };
            
            const uniqueId = "recover-" + Date.now();
            
            d.data.results.forEach(r => { 
                addResult(r.url, p, uniqueId, badgeText); 
                currentResultUrls.push(r.url); 
                
                if (autoSaveDirHandle) {
                    autoSaveToDisk(r.url, `Banana_Recovered_${Date.now()}_${Math.floor(Math.random()*1000)}.png`);
                }
            });
            document.getElementById("downloadAllBtn").classList.remove("hidden");
            document.getElementById("recoverTaskId").value = ""; 
        } else if (d.data.status === "failed") {
            alert(`任务已失败，无法找回。失败原因: ${d.data.failReason || '未知'}`);
        } else {
            alert(`任务仍在处理中 (状态: ${d.data.status}, 进度: ${d.data.progress || 0}%)。请等待完成后再次找回！`);
        }
    } catch (e) {
        alert(`查询异常: ${e.message}`);
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
};

window.generate = async function() {
    const key = document.getElementById("apikey").value.trim();
    if(!key) return log("API Key 为空", "error");
    const count = getCount();
    isTaskCancelled = false;
    document.getElementById("resultArea").innerHTML = "";
    currentResultUrls = [];
    localStorage.setItem('banana_apikey', key);
    
    toggleTaskUI(true);
    log(`==== 准备并发提交 ${count} 个任务 ====`, "info");
    
    const params = {
        model: document.getElementById("model").value,
        prompt: document.getElementById("prompt").value,
        ratio: document.getElementById("ratio").value,
        size: document.getElementById("imageSize").value
    };

    const promises = [];
    for(let i = 1; i <= count; i++) {
        const uniqueId = Date.now() + '-' + i;
        renderResultSkeleton(uniqueId);
        renderLogTaskCard(uniqueId, i); 
        promises.push(submitSingleTask(key, uniqueId, i, params));
    }
    
    await Promise.allSettled(promises);
    if(!isTaskCancelled) log("==== 批量处理完毕 ====", "success");
    toggleTaskUI(false);
};

async function submitSingleTask(key, uniqueId, displayIdx, p) {
    if (isTaskCancelled) return;
    const taskStartTime = Date.now(); 
    
    try {
        updateLogTaskCard(uniqueId, "正在提交请求...", 5);
        updateSkeletonProgress(uniqueId, 5);
        
        const res = await fetch(`${HOST}/v1/draw/nano-banana`, {
            method: "POST", headers: {"Content-Type":"application/json", "Authorization": "Bearer " + key},
            body: JSON.stringify({
                model: p.model, prompt: p.prompt, aspectRatio: p.ratio, imageSize: p.size,
                count: 1, urls: [...uploadedImagesBase64, ...uploadedImageUrls],
                webHook: "-1", shutProgress: false
            })
        });
        const d = await parseSafeJson(res);
        if(d && d.data) {
            try {
                let meta = JSON.parse(localStorage.getItem('banana_tasks_meta') || '{}');
                meta[d.data.id] = p;
                const keys = Object.keys(meta);
                if(keys.length > 200) delete meta[keys[0]]; 
                localStorage.setItem('banana_tasks_meta', JSON.stringify(meta));
            } catch(e) {}
            
            updateLogTaskCard(uniqueId, "排队/生成中...", 10, d.data.id);
            updateSkeletonProgress(uniqueId, 10);
            
            await pollResult(d.data.id, key, uniqueId, p, taskStartTime);
        } else {
            const errMsg = d ? d.msg : "未知错误";
            updateLogTaskCard(uniqueId, `提交失败: ${errMsg}`, 0, null, true);
            updateSkeletonProgress(uniqueId, 0, true);
        }
    } catch(e) { 
        if (!isTaskCancelled) {
            updateLogTaskCard(uniqueId, `提交异常: ${e.message}`, 0, null, true);
            updateSkeletonProgress(uniqueId, 0, true);
        }
    }
}

async function pollResult(id, key, uniqueId, p, taskStartTime){
    taskStartTime = taskStartTime || Date.now(); 
    const iv = Number(document.getElementById("pollInterval").value) * 1000;
    const to = Number(document.getElementById("pollTimeout").value) * 1000;
    const start = Date.now(); 
    
    while(!isTaskCancelled){
        if(Date.now() - start > to) {
            updateLogTaskCard(uniqueId, "等待超时", 0, id, true);
            updateSkeletonProgress(uniqueId, 0, true);
            return;
        }
        await new Promise(r => setTimeout(r, iv));
        if(isTaskCancelled) return;
        
        try {
            const res = await fetch(`${HOST}/v1/draw/result`, {
                method: "POST", headers: {"Content-Type":"application/json", "Authorization": "Bearer " + key},
                body: JSON.stringify({id: id})
            });
            const d = await parseSafeJson(res);
            if(!d || !d.data) continue;
            
            const prog = d.data.progress || 10;
            updateLogTaskCard(uniqueId, `渲染中 ${prog}%`, prog, id);
            updateSkeletonProgress(uniqueId, prog);
            
            if(d.data.status === "succeeded"){
                const costSeconds = Math.round((Date.now() - taskStartTime) / 1000);
                updateLogTaskCard(uniqueId, `生成成功--耗时${costSeconds}秒`, 100, id);
                
                try {
                    let meta = JSON.parse(localStorage.getItem('banana_tasks_meta') || '{}');
                    if (meta[id]) {
                        meta[id].costTime = costSeconds;
                        localStorage.setItem('banana_tasks_meta', JSON.stringify(meta));
                    }
                } catch(e) {}
                
                d.data.results.forEach(r => { 
                    addResult(r.url, p, uniqueId, `耗时 ${costSeconds} 秒`); 
                    currentResultUrls.push(r.url); 
                    
                    if (autoSaveDirHandle) {
                        autoSaveToDisk(r.url, `Banana_${Date.now()}_${Math.floor(Math.random()*1000)}.png`);
                    }
                });
                document.getElementById("downloadAllBtn").classList.remove("hidden");
                return;
            }
            if(d.data.status === "failed") {
                updateLogTaskCard(uniqueId, "生成失败", 0, id, true);
                updateSkeletonProgress(uniqueId, 0, true);
                return;
            }
        } catch(e) { 
            updateLogTaskCard(uniqueId, `轮询异常`, 0, id, true);
            updateSkeletonProgress(uniqueId, 0, true);
        }
    }
}

function addResult(url, p, uniqueId, badgeText = ""){
    const record = { url, model: p.model, prompt: p.prompt, ratio: p.ratio, imageSize: p.size };
    historyImages.unshift(record);
    if(historyImages.length > MAX_HISTORY) historyImages = historyImages.slice(0, MAX_HISTORY);
    localStorage.setItem('banana_history', JSON.stringify(historyImages));
    renderHistory();
    
    const skelText = document.getElementById(`skel-text-${uniqueId}`);
    if (skelText) {
        skelText.innerText = "加载大图中...";
        skelText.className = "text-[10px] text-indigo-500 mt-1 font-mono font-bold animate-pulse";
    }

    const tempImg = new Image();
    
    tempImg.onload = () => {
        const wrap = document.createElement("div");
        wrap.className = "relative group mb-4 break-inside-avoid rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 bg-white";
        
        const img = document.createElement("img");
        img.src = url; 
        img.className = "w-full h-auto cursor-pointer transition-transform duration-700 group-hover:scale-105 animate-fade-in block";
        img.decoding = "async"; 
        img.onclick = () => openModal(record);

        const overlay = document.createElement("div");
        overlay.className = "absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none";

        wrap.append(img, overlay);

        if (badgeText) {
            const badge = document.createElement("div");
            badge.className = "absolute top-3 left-3 bg-emerald-500/90 backdrop-blur-md text-white text-[11px] font-bold px-2.5 py-1 rounded-lg pointer-events-none z-10 shadow-md border border-emerald-300/50 flex items-center gap-1";
            badge.innerHTML = `<span>⏱️</span> ${badgeText}`;
            wrap.append(badge);
        }

        const skeleton = document.getElementById(`skeleton-${uniqueId}`);
        if(skeleton && skeleton.parentNode) {
            skeleton.parentNode.replaceChild(wrap, skeleton);
        } else {
            document.getElementById("resultArea").appendChild(wrap);
        }
    };

    tempImg.onerror = () => {
        const wrap = document.createElement("div");
        wrap.className = "relative group mb-4 break-inside-avoid rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 bg-white";
        const img = document.createElement("img");
        img.src = url;
        img.className = "w-full h-auto cursor-pointer transition-transform duration-700 group-hover:scale-105 animate-fade-in block";
        img.onclick = () => openModal(record);
        wrap.append(img);
        
        const skeleton = document.getElementById(`skeleton-${uniqueId}`);
        if(skeleton && skeleton.parentNode) skeleton.parentNode.replaceChild(wrap, skeleton);
        else document.getElementById("resultArea").appendChild(wrap);
    };

    tempImg.src = url;
}

function getFilteredHistory() {
    const searchInput = document.getElementById("historySearch");
    const keyword = searchInput ? searchInput.value.trim().toLowerCase() : "";
    return historyImages.map((item, originalIndex) => ({ item, originalIndex })).filter(({item}) => {
        if (!keyword) return true;
        if (typeof item === 'object' && item.prompt) {
            return item.prompt.toLowerCase().includes(keyword);
        }
        return false;
    });
}

window.renderHistory = function() {
    const area = document.getElementById("historyArea"); if(!area) return;
    area.innerHTML = "";
    
    const filteredImages = getFilteredHistory();
    
    const searchInput = document.getElementById("historySearch");
    const keyword = searchInput ? searchInput.value.trim() : "";
    if (filteredImages.length === 0 && keyword) {
        area.innerHTML = `<div class="col-span-2 lg:col-span-3 text-center text-slate-400 font-medium text-sm py-8 bg-white/30 rounded-xl border border-dashed border-slate-300">🔍 未找到包含 "${keyword}" 的记录</div>`;
        return;
    }

    filteredImages.forEach(({item, originalIndex}) => {
        const url = typeof item === 'string' ? item : item.url;
        
        const wrap = document.createElement("div"); 
        wrap.className = "relative group mb-3 break-inside-avoid rounded-xl overflow-hidden shadow-sm hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 bg-white";
        
        const img = document.createElement("img"); 
        img.src = url; 
        img.className = "w-full h-auto cursor-pointer transition-transform duration-500 group-hover:scale-105 block";
        img.loading = "lazy";   
        img.decoding = "async"; 
        img.onclick = () => openModal(item);

        const overlay = document.createElement("div");
        overlay.className = "absolute inset-0 bg-gradient-to-tr from-transparent via-transparent to-black/30 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none";

        const btn = document.createElement("button"); btn.innerText = "✕";
        btn.className = "absolute top-2 right-2 bg-red-500/80 backdrop-blur hover:bg-red-600 text-white text-xs rounded-full w-6 h-6 flex items-center justify-center shadow-md transition-all opacity-0 group-hover:opacity-100 scale-90 group-hover:scale-100 border border-white/20";
        btn.onclick = (e) => { 
            e.stopPropagation(); 
            historyImages.splice(originalIndex, 1); 
            localStorage.setItem('banana_history', JSON.stringify(historyImages)); 
            renderHistory(); 
        };
        wrap.append(img, overlay, btn); area.appendChild(wrap);
    });
};

window.openModal = function(item) {
    currentModalItem = item;
    const url = typeof item === 'string' ? item : item.url;
    
    const filteredImages = getFilteredHistory();
    currentModalIndex = filteredImages.findIndex(entry => {
        const img = entry.item;
        return (typeof img === 'string' ? img : img.url) === url;
    });
    
    document.getElementById("modalImg").src = url;
    document.getElementById("imageModal").classList.remove("hidden");
    document.getElementById("prevArrow").classList.toggle("hidden", currentModalIndex <= 0);
    document.getElementById("nextArrow").classList.toggle("hidden", currentModalIndex >= filteredImages.length - 1 || currentModalIndex === -1);
    
    const rb = document.getElementById("reuseBtn");
    if (typeof item === 'object' && item !== null && item.model) {
        rb.classList.remove("hidden");
    } else {
        rb.classList.add("hidden");
    }
};

window.closeModal = function() { document.getElementById("imageModal").classList.add("hidden"); };
window.prevModalImage = function() { 
    const filteredImages = getFilteredHistory();
    if(currentModalIndex > 0) openModal(filteredImages[--currentModalIndex].item); 
};
window.nextModalImage = function() { 
    const filteredImages = getFilteredHistory();
    if(currentModalIndex < filteredImages.length - 1) openModal(filteredImages[++currentModalIndex].item); 
};

window.reuseModalParams = function() {
    if(!currentModalItem || typeof currentModalItem === 'string') return;
    if(currentModalItem.prompt !== undefined) document.getElementById("prompt").value = currentModalItem.prompt;
    if(currentModalItem.model) document.getElementById("model").value = currentModalItem.model;
    if(currentModalItem.ratio) document.getElementById("ratio").value = currentModalItem.ratio;
    if(currentModalItem.imageSize) document.getElementById("imageSize").value = currentModalItem.imageSize;
    closeModal(); 
    log("✅ 已成功复用该图的生成参数", "success");
};

window.uploadToRefFromModal = async function() {
    const url = document.getElementById("modalImg").src;
    if(!url) return;
    
    if (uploadedImagesBase64.length + uploadedImageUrls.length >= MAX_IMAGES) {
        alert("参考素材最多只能添加16张！");
        return;
    }

    try {
        const res = await fetch(url); 
        const blob = await res.blob();
        const reader = new FileReader(); 
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                let w = img.width, h = img.height;
                if (w > MAX_IMG_WIDTH) { h = Math.round((h * MAX_IMG_WIDTH) / w); w = MAX_IMG_WIDTH; }
                const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                uploadedImagesBase64.push(canvas.toDataURL('image/jpeg', 0.92)); 
                renderPreview();
            };
            img.src = ev.target.result;
        }; 
        reader.readAsDataURL(blob);
    } catch(e) {
        if(!uploadedImageUrls.includes(url)) {
            uploadedImageUrls.push(url);
            document.getElementById("refUrls").value = uploadedImageUrls.join("\n");
            renderPreview();
        }
    }
    
    closeModal();
    log("✅ 已将当前图片设为参考素材", "success");
    window.scrollTo({ top: 0, behavior: 'smooth' });
    const previewArea = document.getElementById("previewArea");
    previewArea.classList.add("ring-4", "ring-indigo-400", "scale-[1.02]", "transition-all", "duration-300");
    setTimeout(() => previewArea.classList.remove("ring-4", "ring-indigo-400", "scale-[1.02]"), 600);
};

window.clearApiKey = function() {
    if(confirm('确定彻底清除本地保存的 API Key？')) {
        document.getElementById('apikey').value = '';
        localStorage.removeItem('banana_apikey');
        log("API Key 已清除", "info");
    }
};

window.clearHistory = function() {
    if(confirm("确定要清空所有历史记录吗？")) {
        historyImages = []; localStorage.setItem('banana_history', "[]"); renderHistory();
        log("历史记录已清空", "info");
    }
};

window.exportHistory = function() {
    if(historyImages.length === 0) return alert("当前无历史记录可导出");
    const b = new Blob([JSON.stringify(historyImages, null, 2)], {type: "application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `Banana_Studio_History_${Date.now()}.json`; a.click();
    log("已成功导出历史记录数据", "success");
};

window.importHistory = function(e) {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader(); r.onload = (ev) => {
        try { 
            const d = JSON.parse(ev.target.result); 
            if(Array.isArray(d)) { 
                const currentUrls = new Set(historyImages.map(item => typeof item === 'string' ? item : item.url));
                d.forEach(item => {
                    const itemUrl = typeof item === 'string' ? item : item.url;
                    if(!currentUrls.has(itemUrl)) { historyImages.push(item); currentUrls.add(itemUrl); }
                });
                if(historyImages.length > MAX_HISTORY) historyImages = historyImages.slice(0, MAX_HISTORY);
                localStorage.setItem('banana_history', JSON.stringify(historyImages)); renderHistory(); 
                log("成功导入并合并记录","success"); 
            } 
        } catch(e) { alert("文件解析失败"); }
        e.target.value = '';
    }; r.readAsText(f);
};

window.downloadModalImage = async function() {
    const url = document.getElementById("modalImg").src;
    try {
        const res = await fetch(url); const blob = await res.blob();
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `Nano_${Date.now()}.png`; a.click();
    } catch(e) { window.open(url, '_blank'); }
};

window.downloadAllResults = async function() {
    log("开始下载全部当前结果...");
    for(let url of currentResultUrls) {
        try {
            const res = await fetch(url); const blob = await res.blob();
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `Result_${Date.now()}.png`; a.click();
            await new Promise(r => setTimeout(r, 400));
        } catch(e) {}
    }
};

function toggleTaskUI(isGen) {
    const b1 = document.getElementById("generateBtn"), b2 = document.getElementById("cancelBtn");
    b1.disabled = isGen; 
    b1.innerHTML = isGen ? `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 疯狂渲染中...` : "✨ 开始生成";
    isGen ? b2.classList.remove("hidden") : b2.classList.add("hidden");
}

window.cancelTask = function() { 
    isTaskCancelled = true; 
    toggleTaskUI(false); 
    log("任务已手动取消", "warning");
    
    document.querySelectorAll('[id^="skeleton-"]').forEach(skel => {
        const uniqueId = skel.id.substring(9); 
        const statusText = document.getElementById(`skel-text-${uniqueId}`);
        if(statusText && !statusText.innerText.includes('100%')) {
            updateSkeletonProgress(uniqueId, 0, true);
        }
    });
    
    document.querySelectorAll('[id^="log-status-"]').forEach(statusEl => {
        // 由于加上了耗时，取消任务时通过模糊包含判断，避免把已成功的任务标红
        if(!statusEl.innerText.includes("生成成功") && !statusEl.innerText.includes("失败")) {
            statusEl.innerText = "已手动取消";
            statusEl.className = "text-red-400 text-[10px]";
            statusEl.classList.remove('animate-pulse');
            const uniqueId = statusEl.id.substring(11); 
            const progEl = document.getElementById(`log-progress-${uniqueId}`);
            if(progEl) progEl.className = "bg-red-500 h-1.5 rounded-full";
        }
    });
};

window.closeAnnouncement = function() { document.getElementById("announcementBar").classList.add("hidden"); };
window.clearLog = function() { document.getElementById("logArea").innerHTML = ""; };

function getCount(){
    const s = document.getElementById("countSelect").value;
    return s === "custom" ? Number(document.getElementById("customCount").value) || 1 : Number(s);
}

document.getElementById("refImages").addEventListener("change", function(e) {
    const files = Array.from(e.target.files);
    if (uploadedImagesBase64.length + uploadedImageUrls.length + files.length > MAX_IMAGES) return alert("最多16张");
    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                let w = img.width, h = img.height;
                if (w > MAX_IMG_WIDTH) { h = Math.round((h * MAX_IMG_WIDTH) / w); w = MAX_IMG_WIDTH; }
                const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                uploadedImagesBase64.push(canvas.toDataURL('image/jpeg', 0.92)); renderPreview();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });
    e.target.value = "";
});

document.getElementById("refUrls").addEventListener("input", function(){
    let urls = this.value.split("\n").map(v => v.trim()).filter(Boolean);
    if (urls.length + uploadedImagesBase64.length > MAX_IMAGES) urls = urls.slice(0, MAX_IMAGES - uploadedImagesBase64.length);
    uploadedImageUrls = urls; renderPreview();
});

async function fetchAnnouncement() {
    try {
        const data = { code: 0, data: { message: "📢 欢迎使用 PH AI Studio！系统已更新至最新版本。如果遇到生成排队，请耐心等待。" } };
        if (data.code === 0 && data.data.message) {
            document.getElementById("announcementText").innerText = data.data.message;
            document.getElementById("announcementBar").classList.remove("hidden");
        }
    } catch (err) {}
}

window.addEventListener('DOMContentLoaded', () => {
    const k = localStorage.getItem('banana_apikey'); if(k) document.getElementById('apikey').value = k;
    fetchAnnouncement(); renderPreview(); renderHistory(); initSortable();
    initEditor(); 
    document.getElementById("countSelect").addEventListener("change", e => { document.getElementById("customCount").classList.toggle("hidden", e.target.value !== "custom"); });
});

document.addEventListener('keydown', e => { 
    if(!document.getElementById('imageModal').classList.contains('hidden')){ 
        if(e.key==='ArrowLeft')prevModalImage(); 
        if(e.key==='ArrowRight')nextModalImage(); 
        if(e.key==='Escape')closeModal(); 
    }
});
</script>
